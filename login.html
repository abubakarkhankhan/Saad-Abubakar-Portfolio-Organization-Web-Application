<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NovaEdge Skills Academy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/courses">Courses</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/chatbot">Chatbot</a></li>
            <li><a href="/portfolio">Portfolio</a></li>
            <li><a href="/login">Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <h1 style="color: #667eea; text-align: center; margin-bottom: 2rem;">🔐 Admin Login</h1>
            
            {% if error %}
            <div style="background: #ffebee; color: #c62828; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; text-align: center;">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>

                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 2px solid #e0e0e0; text-align: center;">
                <p style="color: #888; font-size: 0.9rem;">
                    Demo Credentials:<br>
                    <strong>Username:</strong> admin<br>
                    <strong>Password:</strong> 1234
                </p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
